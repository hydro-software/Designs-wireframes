<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naia — Reel conférence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%;
      height: 100%;
      background: #0A1628;
      color: #fff;
      font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-BVyNN0uE.js"></script>
</head>
<body>
  <div id="root"></div>
  <!-- Set Remotion's static base BEFORE any module loads, so staticFile()
       resolves relative to the current page path (e.g. /reel/ on GitHub Pages)
       instead of the site root.
       We use an absolute path because window.remotion_staticBase is read at
       render-time and must survive any internal reassignments by Remotion. -->
  <script>
    (function setStaticBase() {
      // Compute absolute base from the current page URL, stripping the trailing
      // filename if any. Works regardless of where the viewer is hosted.
      var pathname = window.location.pathname;
      var base = pathname.endsWith('/')
        ? pathname.slice(0, -1)
        : pathname.substring(0, pathname.lastIndexOf('/'));
      window.remotion_staticBase = base;
      console.log('[viewer] remotion_staticBase =', base);
    })();
  </script>
</body>
</html>
